{% extends "base.html" %}
{% load static %}
{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    :root { --forest-green: #059669; }
    .btn-primary { background: var(--forest-green); color: white; transition: all 0.2s ease; }
    .btn-primary:hover { background: #047857; }
    .input-field { border: 1px solid #d1d5db; transition: all 0.2s; }
    .input-field:focus { border-color: var(--forest-green); box-shadow: 0 0 0 2px rgba(5,150,105,0.2); outline: none; }
</style>

<section class="py-20 bg-neutral-50 min-h-screen">
    <div class="container mx-auto px-6">
        <div class="max-w-3xl mx-auto">

            <!-- Header -->
            <div class="mb-8">
                <a href="{% url 'main:manage_stock_alerts' %}" 
                   class="text-forest-green hover:underline flex items-center gap-2 mb-4 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M15 19l-7-7 7-7" />
                    </svg>
                    Back to Stock Alerts
                </a>
                <div class="flex items-center gap-3">
                    <svg class="w-8 h-8 text-forest-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8v4l3 3m6 1A9 9 0 1 1 3 12a9 9 0 0 1 18 0z" />
                    </svg>
                    <h1 class="text-4xl font-bold text-neutral-900">Add Stock Alert</h1>
                </div>
            </div>

            <!-- Form Card -->
            <div class="bg-white rounded-2xl p-8 border border-neutral-200 shadow-sm hover:shadow-md transition-shadow">
                <form method="post" class="space-y-6">
                    {% csrf_token %}


                    <!-- Date -->
                    <div>
                        <label class="block text-sm font-semibold text-neutral-700 mb-2">
                            Expected Restock Date <span class="text-red-500">*</span>
                        </label>
                        <input type="text" name="expected_date" required 
                               class="w-full px-4 py-3 rounded-lg input-field">
                    </div>


                    <!-- Active -->
                    <div class="flex items-center gap-2">
                        <input type="checkbox" name="is_active" checked 
                               class="w-4 h-4 text-forest-green rounded focus:ring-forest-green">
                        <label class="text-sm text-neutral-700">Active Alert</label>
                    </div>

                    <!-- Buttons -->
                    <div class="flex gap-4">
                        <button type="submit" 
                                class="flex-1 btn-primary px-6 py-3 rounded-lg font-semibold">
                            <svg class="w-5 h-5 inline-block mr-2 -mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M5 13l4 4L19 7" />
                            </svg>
                            Save Alert
                        </button>
                        <a href="{% url 'main:manage_stock_alerts' %}" 
                           class="flex-1 text-center px-6 py-3 border-2 border-neutral-300 rounded-lg font-semibold hover:bg-neutral-50 transition-colors">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</section>

{% endblock %}
